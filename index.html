    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).

    }

    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;

d:'linear-gradient(135deg,#A78BFA,#6D28D9)', color:'#6D28D9'}\n    ];\n  }\n\n  go(page,level){ this.setState({page, level: level || this.state.level, query:''}); try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(e){} }\n\n  toggleLang(){\n    const next = this.curLang()==='en' ? 'he' : 'en';\n    this.setState({lang:next});\n    try { localStorage.setItem('agi_lang', next); } catch(e){}\n  }\n\n  toggleWatched(id){\n    const w = Object.assign({}, this.state.watched);\n    if(w[id]) delete w[id]; else w[id] = true;\n    this.setState({watched:w});\n    try { localStorage.setItem('agi_watched', JSON.stringify(w)); } catch(e){}\n  }\n\n  enrich(v){\n    const lang = this.curLang();\n    const ui = this.uiText()[lang];\n    const arrow = lang==='he' ? '←' : '→';\n    const m = this.meta(v.level);\n    const watched = !!this.state.watched[v.id];\n    return {\n      id:v.id, level:v.level, duration:v.duration,\n      title:v.title[lang], blurb:v.blurb[lang], categoryLabel:v.category[lang],\n      levelLabel: ui['lbl'+v.level], levelColor:m.color, levelBg:m.bg, gradient:m.grad,\n      watchLessonLabel: ui.watchLesson + ' ' + arrow,\n      watchLabel: watched ? ui.watched : ui.markDone,\n      watchStyle: {fontFamily:\"inherit\", fontWeight:700, fontSize:'12px', padding:'6px 11px', borderRadius:'8px', cursor:'pointer',\n        background: watched?'#ECFDF5':'#fff', color: watched?'#047857':'#5B6B82', border: watched?'1px solid #A7F3D0':'1px solid #E2E8F2'},\n      onOpen: () => this.setState({activeVideo:v}),\n      onToggle: () => this.toggleWatched(v.id)\n    };\n  }\n\n  enrichPost(p){\n    const lang = this.curLang();\n    const ui = this.uiText()[lang];\n    const m = this.blogColor(p.key);\n    const readLabel = lang==='he' ? (p.read[lang] + ' ' + ui.readSuffix) : (p.read[lang] + ' ' + ui.readSuffix);\n    return {\n      title:p.title[lang], excerpt:p.excerpt[lang], categoryLabel:p.category[lang],\n      date:p.date[lang], readLabel, cover:m.g, catColor:m.c,\n      badgeLabel: ui.featuredPrefix + ' · ' + p.category[lang]\n    };\n  }\n\n  renderVals(){\n    const lang = this.curLang();\n    const ui = this.uiText()[lang];\n    const arrow = lang==='he' ? '←' : '→';\n    const dir = lang==='he' ? 'rtl' : 'ltr';\n    const displayFont = lang==='he' ? \"'Heebo',sans-serif\" : \"'Sora',sans-serif\";\n    const fontStack = lang==='he' ? \"'Assistant','Heebo',system-ui,sans-serif\" : \"'Hanken Grotesk',system-ui,sans-serif\";\n\n    const all = this.videosRaw();\n    const q = this.state.query.trim().toLowerCase();\n    const lvl = this.state.level;\n    const filtered = all.filter(v => (lvl==='All' || v.level===lvl) && (!q || (v.title.en+' '+v.title.he+' '+v.tags.join(' ')+' '+v.category.en+' '+v.category.he).toLowerCase().includes(q)));\n\n    const navStyle = (active) => ({fontFamily:\"inherit\", fontWeight:600, fontSize:'15px', border:'none', padding:'9px 15px', borderRadius:'9px', cursor:'pointer',\n      background: active?'#EEF3FB':'transparent', color: active?'#0A1F3C':'#5B6B82'});\n    const navLinks = [\n      {label:ui.navHome, style:navStyle(this.state.page==='home'), onClick:()=>this.go('home')},\n      {label:ui.navLibrary, style:navStyle(this.state.page==='library'), onClick:()=>this.go('library','All')},\n      {label:ui.navBlog, style:navStyle(this.state.page==='blog'), onClick:()=>this.go('blog')},\n      {label:ui.navTrainers, style:navStyle(this.state.page==='trainers'), onClick:()=>this.go('trainers')}\n    ];\n\n    const filterStyle = (active) => ({fontFamily:\"'Sora',sans-serif\", fontWeight:700, fontSize:'14px', padding:'9px 17px', borderRadius:'999px', cursor:'pointer',\n      background: active?'#0A1F3C':'#fff', color: active?'#fff':'#5B6B82', border: active?'1px solid #0A1F3C':'1px solid #E2E8F2'});\n    const levelFilters = ['All','Beginner','Intermediate','Advanced'].map(L => ({label:ui['lbl'+L], style:filterStyle(lvl===L), onClick:()=>this.setState({level:L})}));\n\n    const levelCards = ['Beginner','Intermediate','Advanced'].map(L => {\n      const items = all.filter(v=>v.level===L);\n      const watched = items.filter(v=>this.state.watched[v.id]).length;\n      const pct = items.length ? Math.round(watched/items.length*100) : 0;\n      const m = this.meta(L);\n      return {\n        levelLabel:ui['lbl'+L], count:items.length, color:m.color, grad:m.grad,\n        desc:ui['desc'+L], pctText:pct+'%',\n        countLabel: items.length + ' ' + ui.lessonsWord,\n        exploreLabel: ui.explore + ' ' + arrow,\n        progressLabel: ui.watchedOf.replace('{w}',watched).replace('{n}',items.length),\n        onClick:()=>this.go('library',L)\n      };\n    });\n\n    const roadmap = ui.roadmap;\n    const blogAll = this.blogRaw().map(p=>this.enrichPost(p));\n    const av = this.state.activeVideo;\n\n    return {\n      dir, displayFont, fontStack,\n      page: this.state.page,\n      isHome: this.state.page==='home',\n      isLibrary: this.state.page==='library',\n      isBlog: this.state.page==='blog',\n      isTrainers: this.state.page==='trainers',\n      T: ui,\n      toggleLang: ()=>this.toggleLang(),\n      trainers: this.trainersRaw().map(tr=>({name:tr.name[lang], role:tr.role[lang], bio:tr.bio[lang], tagsLabel:tr.tags[lang], grad:tr.grad, color:tr.color})),\n      goTrainers:()=>this.go('trainers'),\n      goHome:()=>this.go('home'),\n      goLibrary:()=>this.go('library','All'),\n      goBlog:()=>this.go('blog'),\n      goBeginner:()=>this.go('library','Beginner'),\n      goIntermediate:()=>this.go('library','Intermediate'),\n      goAdvanced:()=>this.go('library','Advanced'),\n      navLinks, levelFilters, levelCards, roadmap,\n      totalVideos: all.length,\n      browseLibraryLabel: ui.browseLibrary + ' ' + arrow,\n      viewAllLabel: ui.viewAll.replace('{n}', all.length) + ' ' + arrow,\n      allArticlesLabel: ui.allArticles + ' ' + arrow,\n      readArticleLabel: ui.readArticle + ' ' + arrow,\n      tutorialsCountLabel: ui.tutorialsCount.replace('{n}', filtered.length),\n      query: this.state.query,\n      setQuery: (e)=>this.setState({query:e.target.value}),\n      level: lvl,\n      featured: all.slice(0,6).map(v=>this.enrich(v)),\n      libraryVideos: filtered.map(v=>this.enrich(v)),\n      libraryCount: filtered.length,\n      libraryEmpty: filtered.length===0,\n      blogHome: blogAll.slice(0,3),\n      featuredPost: blogAll[0],\n      blogRest: blogAll.slice(1),\n      activeVideo: av ? this.enrich(av) : null,\n      closeVideo: ()=>this.setState({activeVideo:null}),\n      stop: (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); },\n      showRoadmap: this.props.showRoadmap ?? true,\n      showNewsletter: this.props.showNewsletter ?? true,\n      email: this.state.email,\n      setEmail: (e)=>this.setState({email:e.target.value}),\n      subscribed: this.state.subscribed,\n      notSubscribed: !this.state.subscribed,\n      subscribe: (e)=>{ if(e&&e.preventDefault) e.preventDefault(); if(this.state.email.trim()) this.setState({subscribed:true}); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Agility Hub.dc"}
