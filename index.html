    const templateEl = document.querySelector('script[type="__bundler/template"]');

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).

    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

      try { return decodeURIComponent(s); } catch (e) { return s; }
    }

      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.

        var el = r.anchor && cw.document.getElementById(r.anchor);

        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);

        else cw.scrollTo(0, 0);

\u002Fheader>\n\n  <!-- ============ HOME ============ -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <main>\n    <section style=\"position:relative;overflow:hidden;background:radial-gradient(120% 150% at 82% 0%,#1b3a66 0%,#0A1F3C 52%,#071226 100%);color:#fff;\">\n      <span style=\"position:absolute;top:-80px;right:-60px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,0.45),transparent 70%);\"><\u002Fspan>\n      <span style=\"position:absolute;bottom:-120px;left:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(200,240,49,0.14),transparent 70%);\"><\u002Fspan>\n      <div style=\"position:relative;max-width:1200px;margin:0 auto;padding:84px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:56px;align-items:center;\">\n        <div>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;letter-spacing:0.02em;\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:#C8F031;\"><\u002Fspan>Free video tutorials for every level\n          <\u002Fspan>\n          <h1 style=\"font-family:'Sora';font-weight:800;font-size:clamp(38px,5vw,60px);line-height:1.04;letter-spacing:-0.03em;margin:22px 0 0;\">Master dog agility,<br>one obstacle <span style=\"color:#C8F031;\">at a time.<\u002Fspan><\u002Fh1>\n          <p style=\"font-size:18px;line-height:1.6;color:#B7C4D8;max-width:480px;margin:22px 0 0;\">A growing library of step-by-step video lessons and field-tested articles — sorted by level, so you and your dog always know the next move.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:32px;\">\n            <button onclick=\"{{ goLibrary }}\" style=\"font-family:'Sora';font-weight:700;font-size:15px;background:#C8F031;color:#0A1F3C;border:none;padding:15px 26px;border-radius:13px;cursor:pointer;box-shadow:0 10px 28px rgba(200,240,49,0.28);\" style-hover=\"transform:translateY(-2px);\">Browse the library →<\u002Fbutton>\n            <button onclick=\"{{ goBlog }}\" style=\"font-family:'Sora';font-weight:700;font-size:15px;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.22);padding:15px 26px;border-radius:13px;cursor:pointer;\" style-hover=\"background:rgba(255,255,255,0.12);\">Read the blog<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:34px;margin-top:42px;\">\n            <div><div style=\"font-family:'Sora';font-weight:800;font-size:30px;\">{{ totalVideos }}<\u002Fdiv><div style=\"font-size:13px;color:#8FA0B8;letter-spacing:0.04em;text-transform:uppercase;font-weight:600;margin-top:3px;\">Tutorials<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:1px;background:rgba(255,255,255,0.12);\"><\u002Fdiv>\n            <div><div style=\"font-family:'Sora';font-weight:800;font-size:30px;\">3<\u002Fdiv><div style=\"font-size:13px;color:#8FA0B8;letter-spacing:0.04em;text-transform:uppercase;font-weight:600;margin-top:3px;\">Levels<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:1px;background:rgba(255,255,255,0.12);\"><\u002Fdiv>\n            <div><div style=\"font-family:'Sora';font-weight:800;font-size:30px;\">100%<\u002Fdiv><div style=\"font-size:13px;color:#8FA0B8;letter-spacing:0.04em;text-transform:uppercase;font-weight:600;margin-top:3px;\">Free<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;border-radius:26px;overflow:hidden;background:linear-gradient(160deg,#2563EB,#1E3A8A);box-shadow:0 34px 70px rgba(7,18,38,0.55);aspect-ratio:4/3;\">\n          <span style=\"position:absolute;inset:0;background:radial-gradient(circle at 28% 22%,rgba(255,255,255,0.22),transparent 55%);\"><\u002Fspan>\n          <svg viewBox=\"0 0 400 300\" style=\"position:absolute;inset:0;width:100%;height:100%;\">\n            <line x1=\"20\" y1=\"232\" x2=\"380\" y2=\"232\" stroke=\"rgba(255,255,255,0.28)\" stroke-width=\"2\"><\u002Fline>\n            <rect x=\"64\" y=\"150\" width=\"7\" height=\"84\" rx=\"3\" fill=\"rgba(255,255,255,0.85)\"><\u002Frect>\n            <rect x=\"120\" y=\"150\" width=\"7\" height=\"84\" rx=\"3\" fill=\"rgba(255,255,255,0.85)\"><\u002Frect>\n            <rect x=\"60\" y=\"158\" width=\"71\" height=\"9\" rx=\"4\" fill=\"#C8F031\"><\u002Frect>\n            <rect x=\"195\" y=\"186\" width=\"6\" height=\"48\" rx=\"3\" fill=\"rgba(255,255,255,0.7)\"><\u002Frect>\n            <rect x=\"213\" y=\"186\" width=\"6\" height=\"48\" rx=\"3\" fill=\"rgba(255,255,255,0.7)\"><\u002Frect>\n            <rect x=\"231\" y=\"186\" width=\"6\" height=\"48\" rx=\"3\" fill=\"rgba(255,255,255,0.7)\"><\u002Frect>\n            <rect x=\"249\" y=\"186\" width=\"6\" height=\"48\" rx=\"3\" fill=\"rgba(255,255,255,0.7)\"><\u002Frect>\n            <path d=\"M300 232 q40 -78 78 0\" fill=\"none\" stroke=\"#C8F031\" stroke-width=\"9\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n          <span style=\"position:absolute;top:18px;left:18px;display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.92);color:#1D4ED8;font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;\">▶ Now playing<\u002Fspan>\n          <span style=\"position:absolute;bottom:16px;left:18px;right:18px;font-size:12px;color:rgba(255,255,255,0.75);font-weight:500;\">Drop your own action photo here later — this is a placeholder.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"max-width:1200px;margin:0 auto;padding:84px 24px 20px;\">\n      <span style=\"font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#2563EB;\">Choose your path<\u002Fspan>\n      <h2 style=\"font-family:'Sora';font-weight:800;font-size:clamp(28px,3.5vw,40px);letter-spacing:-0.02em;margin:10px 0 0;\">Train by level<\u002Fh2>\n      <p style=\"font-size:17px;color:#5B6B82;margin:10px 0 36px;max-width:560px;\">Start where you are. Each track builds on the last, from first contacts to championship-level handling.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px;\">\n        <sc-for list=\"{{ levelCards }}\" as=\"lc\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ lc.onClick }}\" style=\"text-align:left;background:#fff;border:1px solid #E8EDF5;border-radius:20px;padding:0;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(10,31,60,0.04);\" style-hover=\"transform:translateY(-4px);box-shadow:0 18px 40px rgba(10,31,60,0.12);\">\n            <span style=\"height:8px;background:{{ lc.grad }};\"><\u002Fspan>\n            <span style=\"padding:24px;display:flex;flex-direction:column;gap:12px;\">\n              <span style=\"display:flex;align-items:center;justify-content:space-between;\">\n                <span style=\"font-family:'Sora';font-weight:800;font-size:22px;color:{{ lc.color }};\">{{ lc.level }}<\u002Fspan>\n                <span style=\"font-size:13px;font-weight:600;color:#94A3B8;\">{{ lc.count }} lessons<\u002Fspan>\n              <\u002Fspan>\n              <span style=\"font-size:14.5px;color:#5B6B82;line-height:1.55;\">{{ lc.desc }}<\u002Fspan>\n              <span style=\"height:7px;background:#EEF2F8;border-radius:99px;overflow:hidden;margin-top:4px;\"><span style=\"display:block;height:100%;width:{{ lc.pctText }};background:{{ lc.grad }};border-radius:99px;\"><\u002Fspan><\u002Fspan>\n              <span style=\"display:flex;align-items:center;justify-content:space-between;margin-top:2px;\">\n                <span style=\"font-size:12.5px;color:#94A3B8;font-weight:600;\">{{ lc.progressLabel }}<\u002Fspan>\n                <span style=\"font-family:'Sora';font-weight:700;font-size:13px;color:{{ lc.color }};\">Explore →<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"max-width:1200px;margin:0 auto;padding:56px 24px 20px;\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:30px;\">\n        <div>\n          <span style=\"font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#2563EB;\">Fresh from the field<\u002Fspan>\n          <h2 style=\"font-family:'Sora';font-weight:800;font-size:clamp(28px,3.5vw,40px);letter-spacing:-0.02em;margin:10px 0 0;\">Latest tutorials<\u002Fh2>\n        <\u002Fdiv>\n        <button onclick=\"{{ goLibrary }}\" style=\"font-family:'Sora';font-weight:700;font-size:14px;color:#2563EB;background:#EAF1FE;border:none;padding:11px 18px;border-radius:11px;cursor:pointer;\" style-hover=\"background:#dbe8fd;\">View all {{ totalVideos }} →<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;\">\n        <sc-for list=\"{{ featured }}\" as=\"item\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff;border:1px solid #E8EDF5;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(10,31,60,0.04);\" style-hover=\"transform:translateY(-4px);box-shadow:0 20px 44px rgba(10,31,60,0.12);\">\n            <button onclick=\"{{ item.onOpen }}\" style=\"position:relative;border:none;padding:0;cursor:pointer;display:block;height:172px;background:{{ item.gradient }};\">\n              <span style=\"position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,0.28),transparent 52%);\"><\u002Fspan>\n              <span style=\"position:absolute;top:12px;left:12px;background:rgba(255,255,255,0.94);color:{{ item.levelColor }};font-size:11px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;padding:5px 10px;border-radius:999px;\">{{ item.level }}<\u002Fspan>\n              <span style=\"position:absolute;bottom:12px;right:12px;background:rgba(10,31,60,0.8);color:#fff;font-size:12px;font-weight:600;padding:4px 9px;border-radius:7px;\">{{ item.duration }}<\u002Fspan>\n              <span style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,0.96);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(10,31,60,0.28);\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"#0A1F3C\"><path d=\"M8 5v14l11-7z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <\u002Fbutton>\n            <div style=\"padding:16px 18px 18px;display:flex;flex-direction:column;gap:8px;flex:1;\">\n              <span style=\"font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#94A3B8;\">{{ item.category }}<\u002Fspan>\n              <h3 style=\"font-family:'Sora';font-weight:700;font-size:17px;line-height:1.28;margin:0;\">{{ item.title }}<\u002Fh3>\n              <p style=\"font-size:13.5px;color:#5B6B82;margin:0;line-height:1.5;flex:1;\">{{ item.blurb }}<\u002Fp>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:6px;\">\n                <button onclick=\"{{ item.onOpen }}\" style=\"font-family:'Sora';font-weight:700;font-size:13px;color:#2563EB;background:none;border:none;padding:0;cursor:pointer;\">Watch lesson →<\u002Fbutton>\n                <button onclick=\"{{ item.onToggle }}\" style=\"{{ item.watchStyle }}\">{{ item.watchLabel }}<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <sc-if value=\"{{ showRoadmap }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"max-width:1200px;margin:0 auto;padding:64px 24px;\">\n      <div style=\"background:linear-gradient(135deg,#0A1F3C,#15315c);border-radius:28px;padding:48px clamp(24px,5vw,56px);color:#fff;\">\n        <span style=\"font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#C8F031;\">How it works<\u002Fspan>\n        <h2 style=\"font-family:'Sora';font-weight:800;font-size:clamp(26px,3.4vw,38px);letter-spacing:-0.02em;margin:10px 0 36px;\">Your path from first jump to finish line<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px;\">\n          <sc-for list=\"{{ roadmap }}\" as=\"step\" hint-placeholder-count=\"3\">\n            <div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:24px;\">\n              <div style=\"font-family:'Sora';font-weight:800;font-size:15px;color:#0A1F3C;background:#C8F031;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;\">{{ step.n }}<\u002Fdiv>\n              <h3 style=\"font-family:'Sora';font-weight:700;font-size:19px;margin:16px 0 8px;\">{{ step.title }}<\u002Fh3>\n              <p style=\"font-size:14.5px;color:#B7C4D8;line-height:1.6;margin:0;\">{{ step.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <section style=\"max-width:1200px;margin:0 auto;padding:20px 24px 24px;\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:30px;\">\n        <div>\n          <span style=\"font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#2563EB;\">From the blog<\u002Fspan>\n          <h2 style=\"font-family:'Sora';font-weight:800;font-size:clamp(28px,3.5vw,40px);letter-spacing:-0.02em;margin:10px 0 0;\">Read &amp; learn<\u002Fh2>\n        <\u002Fdiv>\n        <button onclick=\"{{ goBlog }}\" style=\"font-family:'Sora';font-weight:700;font-size:14px;color:#2563EB;background:#EAF1FE;border:none;padding:11px 18px;border-radius:11px;cursor:pointer;\" style-hover=\"background:#dbe8fd;\">All articles →<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;\">\n        <sc-for list=\"{{ blogHome }}\" as=\"post\" hint-placeholder-count=\"3\">\n          <article style=\"background:#fff;border:1px solid #E8EDF5;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(10,31,60,0.04);\" style-hover=\"transform:translateY(-4px);box-shadow:0 20px 44px rgba(10,31,60,0.12);\">\n            <div style=\"height:150px;background:{{ post.cover }};position:relative;\">\n              <span style=\"position:absolute;inset:0;background:radial-gradient(circle at 75% 15%,rgba(255,255,255,0.25),transparent 55%);\"><\u002Fspan>\n              <span style=\"position:absolute;top:14px;left:14px;background:rgba(255,255,255,0.94);color:{{ post.catColor }};font-size:11px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;padding:5px 11px;border-radius:999px;\">{{ post.category }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:18px 20px 20px;display:flex;flex-direction:column;gap:9px;flex:1;\">\n              <h3 style=\"font-family:'Sora';font-weight:700;font-size:18px;line-height:1.3;margin:0;\">{{ post.title }}<\u002Fh3>\n              <p style=\"font-size:14px;color:#5B6B82;line-height:1.55;margin:0;flex:1;\">{{ post.excerpt }}<\u002Fp>\n              <div style=\"display:flex;align-items:center;gap:10px;font-size:12.5px;color:#94A3B8;font-weight:600;margin-top:4px;\">{{ post.date }}<span style=\"width:3px;height:3px;border-radius:50%;background:#cbd5e1;\"><\u002Fspan>{{ post.read }} read<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ LIBRARY ============ -->\n  <sc-if value=\"{{ isLibrary }}\" hint-placeholder-val=\"{{ false }}\">\n  <main>\n    <section style=\"background:linear-gradient(135deg,#0A1F3C,#16305a);color:#fff;\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:56px 24px 44px;\">\n        <span style=\"font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#C8F031;\">Video library<\u002Fspan>\n        <h1 style=\"font-family:'Sora';font-weight:800;font-size:clamp(32px,4.5vw,48px);letter-spacing:-0.025em;margin:12px 0 0;\">Every lesson, sorted by level<\u002Fh1>\n        <p style=\"font-size:17px;color:#B7C4D8;max-width:560px;margin:14px 0 28px;\">Filter by skill level or search for a specific obstacle. New tutorials land here as soon as they go live.<\u002Fp>\n        <div style=\"position:relative;max-width:440px;\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"position:absolute;left:16px;top:50%;transform:translateY(-50%);\"><circle cx=\"11\" cy=\"11\" r=\"7\" stroke=\"#8FA0B8\" stroke-width=\"2\"><\u002Fcircle><path d=\"M20 20l-3.5-3.5\" stroke=\"#8FA0B8\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <input value=\"{{ query }}\" onchange=\"{{ setQuery }}\" placeholder=\"Search tutorials, e.g. weaves, turns…\" style=\"width:100%;font-family:'Hanken Grotesk';font-size:15px;padding:14px 16px 14px 44px;border-radius:13px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.08);color:#fff;outline:none;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"max-width:1200px;margin:0 auto;padding:28px 24px 80px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:26px;\">\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n          <sc-for list=\"{{ levelFilters }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ f.onClick }}\" style=\"{{ f.style }}\">{{ f.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <span style=\"font-size:14px;color:#5B6B82;font-weight:600;\">{{ libraryCount }} tutorials<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;\">\n        <sc-for list=\"{{ libraryVideos }}\" as=\"item\" hint-placeholder-count=\"8\">\n          <div style=\"background:#fff;border:1px solid #E8EDF5;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(10,31,60,0.04);\" style-hover=\"transform:translateY(-4px);box-shadow:0 20px 44px rgba(10,31,60,0.12);\">\n            <button onclick=\"{{ item.onOpen }}\" style=\"position:relative;border:none;padding:0;cursor:pointer;display:block;height:172px;background:{{ item.gradient }};\">\n              <span style=\"position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,0.28),transparent 52%);\"><\u002Fspan>\n              <span style=\"position:absolute;top:12px;left:12px;background:rgba(255,255,255,0.94);color:{{ item.levelColor }};font-size:11px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;padding:5px 10px;border-radius:999px;\">{{ item.level }}<\u002Fspan>\n              <span style=\"position:absolute;bottom:12px;right:12px;background:rgba(10,31,60,0.8);color:#fff;font-size:12px;font-weight:600;padding:4px 9px;border-radius:7px;\">{{ item.duration }}<\u002Fspan>\n              <span style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,0.96);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(10,31,60,0.28);\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"#0A1F3C\"><path d=\"M8 5v14l11-7z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <\u002Fbutton>\n            <div style=\"padding:16px 18px 18px;display:flex;flex-direction:column;gap:8px;flex:1;\">\n              <span style=\"font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#94A3B8;\">{{ item.category }}<\u002Fspan>\n              <h3 style=\"font-family:'Sora';font-weight:700;font-size:17px;line-height:1.28;margin:0;\">{{ item.title }}<\u002Fh3>\n              <p style=\"font-size:13.5px;color:#5B6B82;margin:0;line-height:1.5;flex:1;\">{{ item.blurb }}<\u002Fp>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:6px;\">\n                <button onclick=\"{{ item.onOpen }}\" style=\"font-family:'Sora';font-weight:700;font-size:13px;color:#2563EB;background:none;border:none;padding:0;cursor:pointer;\">Watch lesson →<\u002Fbutton>\n                <button onclick=\"{{ item.onToggle }}\" style=\"{{ item.watchStyle }}\">{{ item.watchLabel }}<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ libraryEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:70px 20px;color:#5B6B82;\">\n          <div style=\"font-family:'Sora';font-weight:700;font-size:20px;color:#0A1F3C;\">No tutorials match that search<\u002Fdiv>\n          <p style=\"margin:8px 0 0;\">Try a different level or clear your search to see everything.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ BLOG ============ -->\n  <sc-if value=\"{{ isBlog }}\" hint-placeholder-val=\"{{ false }}\">\n  <main>\n    <section style=\"background:linear-gradient(135deg,#0A1F3C,#16305a);color:#fff;\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:56px 24px 44px;\">\n        <span style=\"font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#C8F031;\">The blog<\u002Fspan>\n        <h1 style=\"font-family:'Sora';font-weight:8 90px rgba(0,0,0,0.45);animation:agi-pop .24s ease;\">\n        <div style=\"position:relative;aspect-ratio:16/9;background:{{ activeVideo.gradient }};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;\">\n          <span style=\"position:absolute;inset:0;background:radial-gradient(circle at 30% 22%,rgba(255,255,255,0.25),transparent 55%);\"><\u002Fspan>\n          <button onclick=\"{{ closeVideo }}\" style=\"position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(7,18,38,0.45);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;\" style-hover=\"background:rgba(7,18,38,0.7);\">✕<\u002Fbutton>\n          <span style=\"position:relative;width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,0.96);display:flex;align-items:center;justify-content:center;box-shadow:0 14px 34px rgba(7,18,38,0.35);\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"#0A1F3C\"><path d=\"M8 5v14l11-7z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span style=\"position:relative;color:#fff;font-family:'Sora';font-weight:600;font-size:15px;background:rgba(7,18,38,0.35);padding:8px 16px;border-radius:999px;\">Your YouTube tutorial will play here<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:24px 28px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px;\">\n            <span style=\"background:{{ activeVideo.levelBg }};color:{{ activeVideo.levelColor }};font-size:11px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;padding:5px 11px;border-radius:999px;\">{{ activeVideo.level }}<\u002Fspan>\n            <span style=\"font-size:13px;color:#94A3B8;font-weight:600;\">{{ activeVideo.category }} · {{ activeVideo.duration }}<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Sora';font-weight:800;font-size:24px;letter-spacing:-0.02em;margin:0 0 8px;\">{{ activeVideo.title }}<\u002Fh2>\n          <p style=\"font-size:15px;color:#5B6B82;line-height:1.6;margin:0;\">{{ activeVideo.blurb }}<\u002Fp>\n          <button onclick=\"{{ activeVideo.onToggle }}\" style=\"{{ activeVideo.watchStyle }};margin-top:18px;font-size:14px;padding:10px 16px;\">{{ activeVideo.watchLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;showRoadmap&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showNewsletter&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { page:'home', level:'All', query:'', activeVideo:null, watched:{}, email:'', subscribed:false };\n\n  componentDidMount(){\n    try { const w = JSON.parse(localStorage.getItem('agi_watched') || '{}'); if(w && typeof w==='object') this.setState({watched:w}); } catch(e){}\n  }\n\n  meta(level){\n    if(level==='Beginner')     return {color:'#047857', bg:'#D1FAE5', grad:'linear-gradient(135deg,#34D399,#059669)'};\n    if(level==='Intermediate') return {color:'#1D4ED8', bg:'#DBEAFE', grad:'linear-gradient(135deg,#60A5FA,#2563EB)'};\n    return {color:'#6D28D9', bg:'#EDE9FE', grad:'linear-gradient(135deg,#A78BFA,#6D28D9)'};\n  }\n\n  videosRaw(){\n    return [\n      {id:'b1',level:'Beginner',category:'Foundations',title:'Building Confidence on First Contacts',duration:'7:12',blurb:'Help a nervous dog feel safe approaching new equipment with simple shaping games.',tags:['confidence','shaping','foundations']},\n      {id:'b2',level:'Beginner',category:'Jumping',title:'Intro to Jumps & Bar Awareness',duration:'9:04',blurb:'Teach clean take-offs and body awareness over a single low jump.',tags:['jumps','foundations']},\n      {id:'b3',level:'Beginner',category:'Tunnels',title:'Tunnel Basics: Send & Recall',duration:'6:48',blurb:'Build a fast, happy tunnel using straight-line sends and food rewards.',tags:['tunnel','drive']},\n      {id:'b4',level:'Beginner',category:'Motivation',title:'Recall & Reward Foundations',duration:'8:20',blurb:'Create a powerful recall that keeps your dog connected on course.',tags:['recall','reward']},\n      {id:'i1',level:'Intermediate',category:'Weaves',title:'Reliable Weave Pole Entries',duration:'11:30',blurb:'Train independent entries from any angle using the 2x2 method.',tags:['weaves','entries']},\n      {id:'i2',level:'Intermediate',category:'Handling',title:'Tight Turns & Wraps',duration:'10:15',blurb:'Shave seconds off your run with tighter wraps and clearer cues.',tags:['turns','handling']},\n      {id:'i3',level:'Intermediate',category:'Contacts',title:'Contact Obstacles: The A-Frame',duration:'12:02',blurb:'Teach a confident, safe running contact on the A-frame.',tags:['contacts','a-frame']},\n      {id:'i4',level:'Intermediate',category:'Sequencing',title:'Sequencing Multiple Obstacles',duration:'9:58',blurb:'Connect three to five obstacles into smooth, flowing sequences.',tags:['sequencing','flow']},\n      {id:'a1',level:'Advanced',category:'Handling',title:'Threadle Handling Decoded',duration:'13:24',blurb:'Master threadles with front, blind, and German turn options.',tags:['threadle','handling']},\n      {id:'a2',level:'Advanced',category:'Handling',title:'Backside Sends with Distance',duration:'12:40',blurb:'Send your dog to the backside of a jump from a distance with confidence.',tags:['backside','distance']},\n      {id:'a3',level:'Advanced',category:'Strategy',title:'Distance & Layering Skills',duration:'11:18',blurb:'Work obstacles at a distance and layer behind lines like a pro.',tags:['distance','layering']},\n      {id:'a4',level:'Advanced',category:'Strategy',title:'Course Analysis & Strategy',duration:'14:50',blurb:'Walk a course like a top handler and plan the fastest path.',tags:['strategy','course-map']}\n    ];\n  }\n\n  blogRaw(){\n    return [\n      {title:'5 Warm-Up Routines to Prevent Injury',category:'Health',excerpt:'A few minutes of the right warm-up keeps your dog supple and cuts injury risk before a run.',date:'Jun 12, 2026',read:'5 min'},\n      {title:'Choosing the Right Reward for Your Dog',category:'Training',excerpt:'Food, toy, or play? How to find the reward that builds real drive and focus.',date:'Jun 5, 2026',read:'4 min'},\n      {title:'How to Read a Course Map Like a Pro',category:'Strategy',excerpt:'Turn a confusing tangle of numbers into a clear, fast handling plan.',date:'May 28, 2026',read:'7 min'},\n      {title:'Building Drive in a Distracted Dog',category:'Motivation',excerpt:'Practical games to grow enthusiasm and keep your dog engaged on course.',date:'May 19, 2026',read:'6 min'},\n      {title:'Equipment Guide: A Backyard Course',category:'Gear',excerpt:'What to buy, what to DIY, and how to set up a safe practice course at home.',date:'May 9, 2026',read:'8 min'}\n    ];\n  }\n\n  blogColor(cat){\n    const m = {Health:{c:'#059669',g:'linear-gradient(135deg,#34D399,#059669)'},Training:{c:'#2563EB',g:'linear-gradient(135deg,#60A5FA,#2563EB)'},Strategy:{c:'#6D28D9',g:'linear-gradient(135deg,#A78BFA,#6D28D9)'},Motivation:{c:'#EA580C',g:'linear-gradient(135deg,#FBBF24,#EA580C)'},Gear:{c:'#0891B2',g:'linear-gradient(135deg,#22D3EE,#0891B2)'}};\n    return m[cat] || {c:'#2563EB',g:'linear-gradient(135deg,#60A5FA,#2563EB)'};\n  }\n\n  trainersRaw(){\n    return [\n      {name:'Trainer name', role:'Head Coach \\u00b7 Add title', bio:'Add a short bio here \\u2014 their background in agility, the breeds they\\u2019ve worked with, and what handlers love about training with them.', tags:['Foundations','Competition'], grad:'linear-gradient(135deg,#60A5FA,#2563EB)', color:'#1D4ED8'},\n      {name:'Trainer name', role:'Coach \\u00b7 Add title', bio:'Add a short bio here \\u2014 their background in agility, the breeds they\\u2019ve worked with, and what handlers love about training with them.', tags:['Weaves','Contacts'], grad:'linear-gradient(135deg,#34D399,#059669)', color:'#047857'},\n      {name:'Trainer name', role:'Coach \\u00b7 Add title', bio:'Add a short bio here \\u2014 their background in agility, the breeds they\\u2019ve worked with, and what handlers love about training with them.', tags:['Handling','Strategy'], grad:'linear-gradient(135deg,#A78BFA,#6D28D9)', color:'#6D28D9'}\n    ];\n  }\n\n  go(page,level){ this.setState({page, level: level || this.state.level, query:''}); try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(e){} }\n  toggleWatched(id){\n    const w = Object.assign({}, this.state.watched);\n    if(w[id]) delete w[id]; else w[id] = true;\n    this.setState({watched:w});\n    try { localStorage.setItem('agi_watched', JSON.stringify(w)); } catch(e){}\n  }\n\n  enrich(v){\n    const m = this.meta(v.level);\n    const watched = !!this.state.watched[v.id];\n    return Object.assign({}, v, {\n      levelColor:m.color, levelBg:m.bg, gradient:m.grad, watched,\n      watchLabel: watched ? '✓ Watched' : 'Mark done',\n      watchStyle: {fontFamily:\"'Hanken Grotesk',sans-serif\", fontWeight:700, fontSize:'12px', padding:'6px 11px', borderRadius:'8px', cursor:'pointer',\n        background: watched?'#ECFDF5':'#fff', color: watched?'#047857':'#5B6B82', border: watched?'1px solid #A7F3D0':'1px solid #E2E8F2'},\n      onOpen: () => this.setState({activeVideo:v}),\n      onToggle: () => this.toggleWatched(v.id)\n    });\n  }\n\n  enrichPost(p){\n    const m = this.blogColor(p.category);\n    return Object.assign({}, p, {cover:m.g, catColor:m.c});\n  }\n\n  renderVals(){\n    const all = this.videosRaw();\n    const q = this.state.query.trim().toLowerCase();\n    const lvl = this.state.level;\n    const filtered = all.filter(v => (lvl==='All' || v.level===lvl) && (!q || (v.title+' '+v.tags.join(' ')+' '+v.category).toLowerCase().includes(q)));\n\n    const navStyle = (active) => ({fontFamily:\"'Hanken Grotesk',sans-serif\", fontWeight:600, fontSize:'15px', border:'none', padding:'9px 15px', borderRadius:'9px', cursor:'pointer',\n      background: active?'#EEF3FB':'transparent', color: active?'#0A1F3C':'#5B6B82'});\n    const navLinks = [\n      {label:'Home', style:navStyle(this.state.page==='home'), onClick:()=>this.go('home')},\n      {label:'Library', style:navStyle(this.state.page==='library'), onClick:()=>this.go('library','All')},\n      {label:'Blog', style:navStyle(this.state.page==='blog'), onClick:()=>this.go('blog')},\n      {label:'Trainers', style:navStyle(this.state.page==='trainers'), onClick:()=>this.go('trainers')}\n    ];\n\n    const filterStyle = (active) => ({fontFamily:\"'Sora',sans-serif\", fontWeight:700, fontSize:'14px', padding:'9px 17px', borderRadius:'999px', cursor:'pointer',\n      background: active?'#0A1F3C':'#fff', color: active?'#fff':'#5B6B82', border: active?'1px solid #0A1F3C':'1px solid #E2E8F2'});\n    const levelFilters = ['All','Beginner','Intermediate','Advanced'].map(L => ({label:L, style:filterStyle(lvl===L), onClick:()=>this.setState({level:L})}));\n\n    const levelCards = ['Beginner','Intermediate','Advanced'].map(L => {\n      const items = all.filter(v=>v.level===L);\n      const watched = items.filter(v=>this.state.watched[v.id]).length;\n      const pct = items.length ? Math.round(watched/items.length*100) : 0;\n      const m = this.meta(L);\n      const descs = {Beginner:'Foundations, focus and your dog\\u2019s very first obstacles.', Intermediate:'Weaves, contacts and smooth multi-obstacle sequences.', Advanced:'Threadles, distance work and race-winning strategy.'};\n      return {level:L, count:items.length, color:m.color, grad:m.grad, desc:descs[L], pctText:pct+'%', progressLabel: watched+' of '+items.length+' watched', onClick:()=>this.go('library',L)};\n    });\n\n    const roadmap = [\n      {n:'1', title:'Watch', body:'Pick your level and follow clear, step-by-step video lessons at your own pace.'},\n      {n:'2', title:'Practice', body:'Take one skill to your dog, reward often, and build it before moving on.'},\n      {n:'3', title:'Compete', body:'String skills into sequences and step into the ring with confidence.'}\n    ];\n\n    const blogAll = this.blogRaw().map(p=>this.enrichPost(p));\n    const av = this.state.activeVideo;\n\n    return {\n      page: this.state.page,\n      isHome: this.state.page==='home',\n      isLibrary: this.state.page==='library',\n      isBlog: this.state.page==='blog',\n      isTrainers: this.state.page==='trainers',\n      trainers: this.trainersRaw(),\n      goTrainers:()=>this.go('trainers'),\n      goHome:()=>this.go('home'),\n      goLibrary:()=>this.go('library','All'),\n      goBlog:()=>this.go('blog'),\n      goBeginner:()=>this.go('library','Beginner'),\n      goIntermediate:()=>this.go('library','Intermediate'),\n      goAdvanced:()=>this.go('library','Advanced'),\n      navLinks, levelFilters, levelCards, roadmap,\n      totalVideos: all.length,\n      query: this.state.query,\n      setQuery: (e)=>this.setState({query:e.target.value}),\n      level: lvl,\n      featured: all.slice(0,6).map(v=>this.enrich(v)),\n      libraryVideos: filtered.map(v=>this.enrich(v)),\n      libraryCount: filtered.length,\n      libraryEmpty: filtered.length===0,\n      blogHome: blogAll.slice(0,3),\n      featuredPost: blogAll[0],\n      blogRest: blogAll.slice(1),\n      activeVideo: av ? this.enrich(av) : null,\n      closeVideo: ()=>this.setState({activeVideo:null}),\n      stop: (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); },\n      showRoadmap: this.props.showRoadmap ?? true,\n      showNewsletter: this.props.showNewsletter ?? true,\n      email: this.state.email,\n      setEmail: (e)=>this.setState({email:e.target.value}),\n      subscribed: this.state.subscribed,\n      notSubscribed: !this.state.subscribed,\n      subscribe: (e)=>{ if(e&&e.preventDefault) e.preventDefault(); if(this.state.email.trim()) this.setState({subscribed:true}); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Agility Hub.dc"}
